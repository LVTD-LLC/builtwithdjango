{% load static %}
{% load widget_tweaks %}

<div data-controller="like"
     data-like-project-id-value="{{ site.id }}"
     data-like-count-value="{{ site.like_count|default:0 }}"
     data-like-liked-value="{{ site.user_has_liked|yesno:'true,false' }}"
     data-like-toggle-url-value="{% url 'api_project_like_toggle' site.id %}"
     class="inline-flex">
  {% csrf_token %}
  {% if user.is_authenticated %}
    <button data-action="click->like#modify"
            data-analytics-event="project like button clicked"
            data-analytics-project-id="{{ site.id }}"
            data-analytics-project-title="{{ site.title }}"
            class="bw-icon-button gap-1"
            type="button"
            aria-label="Like {{ site.title }}">
      <span class="text-sm font-black" data-like-target="numberOfLikes">{{ site.like_count|default:0 }}</span>
      <i data-like-target="heart"
         class="{% if site.user_has_liked %}text-red-600 las{% else %}lar{% endif %} la-heart block"
         aria-hidden="true"></i>
    </button>
  {% else %}
    <button data-action="click->like#toggleModal"
            data-like-target="modalButton"
            data-analytics-project-id="{{ site.id }}"
            data-analytics-project-title="{{ site.title }}"
            class="bw-icon-button gap-1"
            type="button"
            aria-label="Like {{ site.title }}">
      <span class="text-sm font-black" data-like-target="numberOfLikes">{{ site.like_count|default:0 }}</span>
      <i data-like-target="heart"
         class="{% if site.user_has_liked %}text-red-600 las{% else %}lar{% endif %} la-heart block"
         aria-hidden="true"></i>
    </button>
    <div data-like-target="modal"
         class="fixed inset-0 z-50 hidden overflow-y-auto"
         aria-labelledby="modal-title"
         role="dialog"
         aria-modal="true">
      <div class="flex min-h-screen items-end justify-center px-4 pb-20 pt-4 text-center sm:block sm:p-0">
        <div class="fixed inset-0 bg-[oklch(20%_0.035_156_/_0.64)] transition-opacity" aria-hidden="true"></div>
        <span class="hidden sm:inline-block sm:h-screen sm:align-middle" aria-hidden="true">&#8203;</span>
        <div class="inline-block w-full max-w-lg transform overflow-hidden rounded-lg bg-[var(--bw-surface)] text-left align-bottom shadow-xl transition-all sm:my-8 sm:align-middle">
          <div class="p-6">
            <div class="flex items-start justify-between gap-6">
              <div>
                <h3 class="text-xl font-black text-[var(--bw-ink)]" id="modal-title">Sign in to save projects</h3>
                <p class="mt-2 text-sm leading-6 bw-muted">
                  Liking projects helps you build a personal shortlist and gives project owners a signal that their work is useful.
                </p>
              </div>
              <button data-action="click->like#toggleModal"
                      data-like-target="modalButton"
                      type="button"
                      class="bw-icon-button shrink-0"
                      aria-label="Close dialog">
                <i class="las la-times" aria-hidden="true"></i>
              </button>
            </div>
          </div>
          <div class="flex flex-col-reverse gap-2 border-t border-[var(--bw-border)] bg-[var(--bw-surface-raised)] p-4 sm:flex-row sm:justify-end">
            <button data-action="click->like#toggleModal"
                    data-like-target="modalButton"
                    type="button"
                    class="bw-button bw-button-secondary">
              Keep browsing
            </button>
            <a href="{% url 'account_login' %}" class="bw-button bw-button-primary">Sign in</a>
            <a href="{% url 'account_signup' %}" class="bw-button bw-button-accent">Create account</a>
          </div>
        </div>
      </div>
    </div>
  {% endif %}
</div>
