name: CI

on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  python:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.13"
    env:
      DJANGO_SETTINGS_MODULE: builtwithdjango.test_settings
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y libpq-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Django system check
        run: python manage.py check --settings=builtwithdjango.test_settings

      - name: Check migration drift
        run: python manage.py makemigrations --check --dry-run --settings=builtwithdjango.test_settings

      - name: Compile Python modules
        run: python -m compileall -q api blog builtwithdjango developers jobs makers newsletter pages podcast projects tools users

      - name: Run tests
        run: |
          pytest \
            --cov=api \
            --cov=blog \
            --cov=builtwithdjango \
            --cov=developers \
            --cov=jobs \
            --cov=makers \
            --cov=newsletter \
            --cov=pages \
            --cov=podcast \
            --cov=projects \
            --cov=tools \
            --cov=users \
            --cov-report=term-missing:skip-covered

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build
