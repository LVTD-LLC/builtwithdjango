name: Deploy Prod

on:
  push:
    branches:
      - master

env:
  CAPROVER_APP_NAME: bwd

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare image name
        id: image
        shell: bash
        run: echo "image_name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deployment/Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.image_name }}:latest
            ${{ steps.image.outputs.image_name }}:${{ github.sha }}

      - name: Build and push workers
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deployment/Dockerfile
          push: true
          build-args: |
            APP_PROCESS_TYPE=worker
          tags: |
            ${{ steps.image.outputs.image_name }}:worker-latest
            ${{ steps.image.outputs.image_name }}:worker-${{ github.sha }}

      - name: Deploy server to CapRover
        uses: caprover/deploy-from-github@v1.2.0
        with:
          server: ${{ secrets.CAPROVER_SERVER }}
          app: ${{ env.CAPROVER_APP_NAME }}
          token: ${{ secrets.APP_TOKEN }}
          image: ${{ steps.image.outputs.image_name }}:${{ github.sha }}

      - name: Wait for server readiness
        shell: bash
        env:
          SERVER_HEALTH_URL: ${{ vars.SERVER_HEALTH_URL }}
          SERVER_MIGRATION_GRACE_SECONDS: ${{ vars.SERVER_MIGRATION_GRACE_SECONDS || '60' }}
        run: |
          if [ -z "$SERVER_HEALTH_URL" ]; then
            echo "SERVER_HEALTH_URL is not set. Waiting ${SERVER_MIGRATION_GRACE_SECONDS}s before worker deploy."
            sleep "$SERVER_MIGRATION_GRACE_SECONDS"
            exit 0
          fi

          for attempt in {1..36}; do
            if curl --fail --silent --show-error --max-time 10 "$SERVER_HEALTH_URL" > /dev/null; then
              echo "Server is ready: $SERVER_HEALTH_URL"
              exit 0
            fi
            echo "Waiting for server readiness at $SERVER_HEALTH_URL (attempt $attempt/36)."
            sleep 5
          done

          echo "::error::Server did not become ready at $SERVER_HEALTH_URL within 180s."
          exit 1

      - name: Deploy workers to CapRover
        uses: caprover/deploy-from-github@v1.2.0
        with:
          server: ${{ secrets.CAPROVER_SERVER }}
          app: ${{ env.CAPROVER_APP_NAME }}-workers
          token: ${{ secrets.WORKERS_APP_TOKEN }}
          image: ${{ steps.image.outputs.image_name }}:worker-${{ github.sha }}
