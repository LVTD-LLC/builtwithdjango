[pytest]
DJANGO_SETTINGS_MODULE = builtwithdjango.test_settings
python_files = tests.py test_*.py *_tests.py
testpaths =
    api
    blog
    builtwithdjango
    developers
    jobs
    makers
    newsletter
    pages
    podcast
    projects
    tools
    users
addopts =
    --tb=short
    --strict-markers
    --no-migrations
